# RetroSeek tooling config. Not a Python package manifest — this repo is a
# Snakemake workflow, not a library. Ruff, mypy, pytest, and coverage are
# configured here. Runtime dependencies live in data/config/environment.yml.

[tool.ruff]
target-version = "py310"
line-length = 88
src = ["workflow/scripts", "tests"]
extend-exclude = [
    ".snakemake",
    "results",
    "data/pickles",
    "data/species",
    "data/tables",
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "PTH",    # flake8-use-pathlib
    "RUF",    # Ruff-specific
    "A",      # flake8-builtins
    "DTZ",    # flake8-datetimez
    "LOG",    # flake8-logging
    "PT",     # flake8-pytest-style
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "ARG",    # flake8-unused-arguments
    "PL",     # Pylint
    "PERF",   # Perflint
]
ignore = [
    "E501",    # line length handled by formatter
    "PLR0913", # too many arguments
    "PLR2004", # magic values in comparisons
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ARG", "PLR2004"]
"workflow/Snakefile" = ["F821"]  # Snakemake-injected globals

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["retroseek"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
warn_unreachable = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_reexport = true
files = ["workflow/scripts"]
exclude = ['(^|/)tests/', '\.snakemake/', 'results/', 'data/']
enable_error_code = [
    "ignore-without-code",
    "redundant-cast",
    "truthy-bool",
]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

# Third-party libs without stubs — keep overrides narrow.
[[tool.mypy.overrides]]
module = [
    "Bio.*",
    "pandas",
    "pandera.*",
    "dill.*",
    "yaml",
    "yamale.*",
    "coloredlogs.*",
    "tqdm.*",
    "snakemake.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests", "workflow/tests"]
pythonpath = ["workflow/scripts"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "-q",
]
markers = [
    "slow: deselect with '-m \"not slow\"'",
    "integration: requires external tools (blast, genometools)",
    "network: requires internet access (entrez, datasets)",
]

[tool.coverage.run]
source = ["workflow/scripts"]
branch = true
omit = ["*/tests/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
