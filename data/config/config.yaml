# RetroSeek configuration — EXAMPLE VALUES ONLY.
# This file is committed and public. Do NOT put real study data here (genome
# catalog, machine paths, probe CSV): keep those in data/config/config.local.yaml
# (gitignored) and run with `--configfile`. See data/config/config.example.yaml.
# Every field is documented in docs/configuration.md
#   (or run `RetroSeek --config-help [KEY]` for a single field).
# Types / enums / ranges are enforced by data/config/schema.yaml.

blast:
  e_value: 0.01
  optional_parameters: ''

genome_tools:
  suffix_array_parts: 30
  suffixerator_optional_parameters: ''
  ltrharvest_optional_parameters: ''
  ltrdigest_optional_parameters: ''

parameters:
  seed: 67
  identity_threshold: 0
  bitscore_threshold: 0
  ltr_resize: 0
  ltr_flank_margin: 0
  merge_option: 'virus'
  hotspot_group_split: false
  hotspot_window_size: 10000
  hotspot_mask_size: 20
  hotspot_mask_mismatch: 3
  hotspot_permutations: 1
  hotspot_pvalue_threshold: 0.05
  probe_to_pair: 'ENV'
  pair_max_gap: 300000
  main_probes:
    - 'POL'
    - 'GAG'
    - 'ENV'
    - 'PRO'
  probe_min_length:
    GAG: 200
    POL: 400
    ENV: 200
    VIF: 200
    N_protein: 200
  aggregation:
    virus: "best"
    label: "best"
    probe: "list"
    species: "first"
    best_tiebreaker: "bitscore"
    concat_separator: "; "
    strict_marker: "ambiguous"
  solo_ltr_aggregation:
    probe: "list"
    best_tiebreaker: "consensus_members"
  erv_like:
    group_by: 'virus'
    max_join_distance: 1500
    require_canonical_order: false
    completeness_threshold: 1.0

ltr_retriever:
  substitution_rate: 1.3e-8
  min_ltr_similarity: 91
  threads_per_genome: 4
  noanno: true
  source_scn: retroviral
  nearest_erv_max_distance: 10000

logging:
  level_styles:
    debug: { color: 'white' }
    info: { color: 'cyan', bold: 'yes' }
    warning: { color: 'yellow' }
    error: { color: 'red', bold: 'yes' }
    critical: { color: 'black', bold: 'yes', background: 'red' }
  field_styles:
    asctime: { color: 'green' }
    hostname: { color: 'green' }
    levelname: { color: 'green' }
    name: { color: 'green' }
    programname: { color: 'green' }
    username: { color: 'green' }
    process: { color: 'green' }
    thread: { color: 'green' }

plots:
  dpi: 300
  width: 15
  height: 12
  bitscore_x_scale: linear
  sankey_top_n: null
  sankey_other_label: 'Other'
  waffle_unit_hits: null
  circle_plot_bitscore_threshold: 0

execution:
  num_cores: 64
  use_species_dict: true
  retrieval_time_lag: 0.3
  max_retrieval_attempts: 9
  max_threadpool_workers: null
  entrez_email: 'your.email@institution.example'

input:
  probe_csv: 'data/tables/probes.csv'

display:
  display_snakemake_info: false
  display_requests_warning: false
  display_operation_info: true

root:
  db_root_folder: 'data/species'
  data_root_folder: 'data'
  results_root_folder: 'results'
  logs_root_folder: 'logs'

domains:
  POL:
    - "ase"
    - "RVT_1"
    - "RVT_2"
  GAG:
    - "Gag"
    - "gag"
    - "GAG"
    - "zf"
    - "PTAP"
    - "YPXL"
  ENV:
    - "coat"
    - "FP"
    - "HR1"
    - "HR2"
  PR15:
    - "PR15"

species:
  # key = genome FASTA stem in SPECIES_DB; value = display name.
  # Example values only — list your real genomes in config.local.yaml.
  example_genome_1: "Example species one"
  # example_genome_2: "Example species two"   # uncomment to add a genome
