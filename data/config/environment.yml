# Source of truth for the RetroSeek dev + runtime environment.
#
# Discipline: every new `import` in workflow/scripts/*.py or tests/, and
# every new R `library(...)` in workflow/scripts/*.R or
# workflow/tests/testthat/*.R, must have its corresponding conda package
# added to this file in the SAME commit. Keep the section comments below
# accurate so contributors can find where a new dep belongs at a glance.
#
# Standard workflows:
#   make env         # first-time creation (calls mamba env create)
#   make env-update  # in-place sync after editing this file
#   conda activate retroseek
#   make check       # full lint + format-check + typecheck + tests

name: retroseek
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # ── runtime ──────────────────────────────────────────────
  # Python is pinned to 3.11 (lower bound for snakemake>=8). Source code
  # remains 3.10-syntax-compatible — ruff/mypy targets in pyproject.toml
  # are py310 so we don't accidentally adopt newer syntax that would
  # break someone running an older interpreter manually.
  - python=3.11
  - snakemake>=8
  - snakemake-wrapper-utils

  # ── external bio tools ──────────────────────────────────
  - blast>=2.15          # tblastn, blastn, makeblastdb
  - genometools-genometools  # gt ltrharvest, gt ltrdigest
  - ncbi-datasets-cli    # genome download via `datasets`
  - ltr_retriever        # solo-LTR post-processing of LTRharvest output
                         #   pulls Perl + HMMER + TRF as transitive deps;
                         #   used by workflow/scripts/ltr_retriever_prefilter.py
                         #   + solo_ltr_integrator.py. See docs/solo_ltr.md.

  # ── python libs ─────────────────────────────────────────
  # biopython is version-pinned for reproducibility: the tBLASTn pickle cache
  # is only readable by the Biopython version that wrote it (older releases
  # exposed `Bio.Blast.Record`, which newer ones removed). Pinning keeps
  # `make env` deterministic; if you bump it, regenerate the cache (--blast).
  - biopython=1.87
  - pandas
  - pyarrow              # parquet I/O from Python
  - pandera
  - dill
  - tqdm
  - coloredlogs
  - pyyaml
  - yamale

  # ── R + data stack ──────────────────────────────────────
  - r-base=4.3
  - r-tidyverse
  - r-argparse
  - r-yaml
  - r-arrow              # parquet I/O from R
  - r-purrr
  - r-stringr
  - r-ggsci
  - r-ggnewscale
  - r-ggalluvial
  - r-ggdist
  - r-waffle

  # ── R Bioconductor ──────────────────────────────────────
  - bioconductor-biostrings
  - bioconductor-genomicranges
  - bioconductor-rtracklayer
  - bioconductor-plyranges
  - bioconductor-regioner
  - bioconductor-ggbio

  # ── dev / QA ────────────────────────────────────────────
  - pytest>=8
  - pytest-cov
  - pytest-mock
  - mypy>=1.15
  - ruff>=0.11
  - pre-commit>=4
  - r-lintr
  - r-styler
  - r-testthat
