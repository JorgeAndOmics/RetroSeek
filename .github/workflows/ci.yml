name: CI

# Fast quality gate mirroring `make check` (lint + format-check + typecheck +
# Python and R unit tests). The heavy bioinformatics integration tests (BLAST+,
# GenomeTools, NCBI Datasets, full conda env) are intentionally left to local
# `make check` — they are too slow/large to install on every push.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — lint, type-check, fast tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tooling + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest \
            snakemake biopython dill pandas pyarrow pandera tqdm coloredlogs pyyaml
      - name: Ruff lint
        run: ruff check workflow/scripts tests workflow/tests
      - name: Ruff format check
        run: ruff format --check workflow/scripts tests workflow/tests
      - name: Mypy (strict, workflow/scripts)
        run: mypy workflow/scripts
      - name: Pytest (fast subset — excludes slow/integration/network)
        run: pytest -m "not slow and not integration and not network"

  r:
    name: R — testthat unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      # Installs CRAN + Bioconductor packages via pak, with an automatic cache
      # keyed on the package list — only the first run pays the full cost.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::testthat
            any::tidyverse
            any::arrow
            any::ggalluvial
            any::ggdist
            any::ggsci
            any::scales
            any::yaml
            bioc::GenomicRanges
            bioc::IRanges
            bioc::S4Vectors
            bioc::plyranges
            bioc::rtracklayer
      - name: Run testthat suite
        run: Rscript -e 'testthat::test_dir("workflow/tests/testthat", stop_on_failure = TRUE)'
