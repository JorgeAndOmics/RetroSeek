# Generic end-to-end test config for RetroSeek — EXAMPLE VALUES ONLY.
#
# A full, schema-valid config for exercising the whole pipeline on your own
# data without touching the committed data/config/config.yaml. Usage:
#
#   1) mamba env create -f data/config/environment.yml          # once
#   2) cp tests/fixtures/example_test_config.yaml \
#         data/config/config.local.yaml                         # gitignored
#   3) Edit config.local.yaml — set the four `root` paths, `input.probe_csv`,
#      `execution.entrez_email`, and your real `species:` entries.
#   4) Run stages with --configfile, e.g.:
#        ./RetroSeek --probe-extractor     --configfile data/config/config.local.yaml
#        ./RetroSeek --ltr-candidates      --configfile data/config/config.local.yaml --cores 8
#        ./RetroSeek --ranges-analysis     --configfile data/config/config.local.yaml --cores 4
#        ./RetroSeek --solo-ltr-detection  --configfile data/config/config.local.yaml --cores 8
#
# Values below are illustrative; tune to your machine and dataset. Every field
# is documented in docs/configuration.md (or: RetroSeek --config-help [KEY]).

blast:
  e_value: 0.01
  optional_parameters: ''

genome_tools:
  suffix_array_parts: 10
  suffixerator_optional_parameters: ''
  ltrharvest_optional_parameters: ''
  ltrdigest_optional_parameters: ''

parameters:
  seed: 67
  identity_threshold: 0
  bitscore_threshold: 50
  ltr_resize: 0
  ltr_flank_margin: 0
  merge_option: 'virus'
  hotspot_group_split: false
  hotspot_window_size: 10000
  hotspot_mask_size: 20
  hotspot_mask_mismatch: 3
  hotspot_permutations: 1
  hotspot_pvalue_threshold: 0.05
  probe_to_pair: 'ENV'
  pair_max_gap: 300000
  main_probes:
    - 'POL'
    - 'GAG'
    - 'ENV'
    - 'PRO'
  probe_min_length:
    GAG: 100
    POL: 100
    ENV: 100
    PRO: 100
  aggregation:
    virus: "list"
    label: "list"
    probe: "list"
    species: "first"
    best_tiebreaker: "bitscore"
    concat_separator: "; "
    strict_marker: "ambiguous"
  solo_ltr_aggregation:
    probe: "list"
    best_tiebreaker: "consensus_members"
  erv_like:
    group_by: 'virus'
    max_join_distance: 1500
    require_canonical_order: false
    completeness_threshold: 1.0

ltr_retriever:
  substitution_rate: 1.3e-8
  min_ltr_similarity: 91
  threads_per_genome: 4
  noanno: true
  source_scn: retroviral
  nearest_erv_max_distance: 10000

logging:
  level_styles:
    debug: { color: 'white' }
    info: { color: 'cyan', bold: 'yes' }
    warning: { color: 'yellow' }
    error: { color: 'red', bold: 'yes' }
    critical: { color: 'black', bold: 'yes', background: 'red' }
  field_styles:
    asctime: { color: 'green' }
    hostname: { color: 'green' }
    levelname: { color: 'green' }
    name: { color: 'green' }
    programname: { color: 'green' }
    username: { color: 'green' }
    process: { color: 'green' }
    thread: { color: 'green' }

plots:
  dpi: 100
  width: 10
  height: 8
  bitscore_x_scale: linear
  sankey_top_n: null
  sankey_other_label: 'Other'
  waffle_unit_hits: null
  circle_plot_bitscore_threshold: 0

execution:
  num_cores: 8
  use_species_dict: true
  retrieval_time_lag: 0.3
  max_retrieval_attempts: 3
  max_threadpool_workers: 4
  entrez_email: 'your.email@institution.example'

input:
  probe_csv: '/path/to/your/probes.csv'

display:
  display_snakemake_info: false
  display_requests_warning: false
  display_operation_info: true

root:
  db_root_folder: '/path/to/your/genomes'
  data_root_folder: '/tmp/retroseek-test/data'
  results_root_folder: '/tmp/retroseek-test/results'
  logs_root_folder: '/tmp/retroseek-test/logs'

domains:
  POL:
    - "ase"
    - "RVT_1"
    - "RVT_2"
  GAG:
    - "Gag"
    - "gag"
    - "GAG"
    - "zf"
  ENV:
    - "coat"
    - "FP"
    - "HR1"
  PR15:
    - "PR15"

species:
  # key = genome FASTA stem in SPECIES_DB; value = display name.
  example_genome_1: "Example species one"
